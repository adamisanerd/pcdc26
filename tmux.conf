# ── PCDC 2026 Blue Team tmux config ──────────────────────────

# Use Ctrl+A as prefix (easier than Ctrl+B in competition stress)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window and pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Bigger scrollback buffer — you'll want to scroll through alerts
set -g history-limit 50000

# Status bar — shows host, time, and window list
set -g status-bg colour234
set -g status-fg colour137
set -g status-left '#[fg=colour82,bold] 🛸 ASTRA9 #[fg=colour238,bg=colour234]'
set -g status-right '#[fg=colour82]%H:%M:%S #[fg=colour238]| #[fg=colour82]%d-%b'
set -g status-right-length 50
set -g status-left-length 30
set -g status-interval 1

# Active window highlight
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour82

# Mouse support — useful during competition
set -g mouse on

# Faster key repetition
set -s escape-time 0

# Alert on activity in other windows — useful for monitoring
setw -g monitor-activity on
set -g visual-activity on

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Easy pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"
