name: Blue Team CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shell-lint-and-syntax:
    name: Shell scripts (lint + syntax + executable)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends shellcheck findutils

      - name: Lint every .sh file
        shell: bash
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh" | sort)
          if [ "${#SH_FILES[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 1
          fi
          printf 'Linting %s shell scripts\n' "${#SH_FILES[@]}"
          shellcheck --severity=warning "${SH_FILES[@]}"

      - name: Syntax check every .sh file
        shell: bash
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh" | sort)
          for f in "${SH_FILES[@]}"; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Ensure every .sh file is executable
        shell: bash
        run: |
          mapfile -t SH_FILES < <(find . -type f -name "*.sh" | sort)
          not_exec=0
          for f in "${SH_FILES[@]}"; do
            if [ ! -x "$f" ]; then
              echo "NOT EXECUTABLE: $f"
              not_exec=1
            fi
          done
          if [ "$not_exec" -ne 0 ]; then
            echo "One or more shell scripts are not executable."
            exit 1
          fi

  powershell-parse:
    name: PowerShell scripts (parse)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse every .ps1 file
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse | Sort-Object FullName
          if (-not $files) {
            throw 'No PowerShell scripts found.'
          }

          foreach ($file in $files) {
            Write-Host "Parsing $($file.FullName)"
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Host "ERROR in $($file.FullName): $($_.Message)" -ForegroundColor Red
              }
              throw "PowerShell parse errors found in $($file.FullName)"
            }
          }

  tests:
    name: Utility tests (bash)
    runs-on: ubuntu-latest
    needs: shell-lint-and-syntax
    permissions:
      contents: read
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            iproute2 \
            procps \
            cron

      - name: Make utility scripts executable
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Run test suite
        run: |
          bash tests/test_check_open_ports.sh
          bash tests/test_check_failed_logins.sh
          bash tests/test_check_file_integrity.sh
          bash tests/test_check_processes.sh
          bash tests/test_check_crontabs.sh

  utility-smoke:
    name: Utility smoke tests
    runs-on: ubuntu-latest
    needs: shell-lint-and-syntax
    permissions:
      contents: read
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            iproute2 \
            procps \
            cron

      - name: Make utility scripts executable
        run: chmod +x scripts/*.sh

      - name: Smoke check_open_ports
        run: bash scripts/check_open_ports.sh

      - name: Smoke check_processes
        run: bash scripts/check_processes.sh

      - name: Smoke check_crontabs
        run: bash scripts/check_crontabs.sh

      - name: Smoke check_file_integrity (generate + verify)
        run: |
          TMPDIR_SMOKE="$(mktemp -d)"
          echo "sample" > "$TMPDIR_SMOKE/file.txt"
          bash scripts/check_file_integrity.sh \
            --generate \
            --dir "$TMPDIR_SMOKE" \
            --output "$TMPDIR_SMOKE/checksums.sha256"
          bash scripts/check_file_integrity.sh \
            --verify \
            --dir "$TMPDIR_SMOKE" \
            --input "$TMPDIR_SMOKE/checksums.sha256"
          rm -rf "$TMPDIR_SMOKE"
